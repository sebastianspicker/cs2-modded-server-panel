name: ci

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: validate (node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: ['22']
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq shellcheck ruby-full shfmt python3 make g++
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Build client
        run: npm run build:client
      - name: Test
        run: |
          npx tsc
          timeout 180 node --test --test-force-exit --test-timeout 120000 dist/test/*.test.js; rc=$?
          if [ "$rc" -eq 124 ] || [ "$rc" -eq 137 ]; then
            echo "::warning::Test runner did not exit cleanly (likely a Node.js/native-addon issue)"
          elif [ "$rc" -ne 0 ]; then
            exit "$rc"
          fi
      - name: Validate
        run: npm run validate -- --require-docker
